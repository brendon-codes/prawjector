name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_slug }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            target_arg: x86_64-unknown-linux-gnu.2.17
            asset_slug: x86_64-linux-gnu
          - target: aarch64-unknown-linux-gnu
            target_arg: aarch64-unknown-linux-gnu.2.17
            asset_slug: aarch64-linux-gnu
          - target: x86_64-unknown-linux-musl
            target_arg: x86_64-unknown-linux-musl
            asset_slug: x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            target_arg: aarch64-unknown-linux-musl
            asset_slug: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version 0.22.3 --locked
      - name: Install Zig
        run: python3 -m pip install ziglang==0.16.0
      - name: Build release binary
        env:
          CARGO_ZIGBUILD_PYTHON_PATH: python3
          LIBZ_SYS_STATIC: "1"
        run: cargo zigbuild --release --locked --target "${{ matrix.target_arg }}"
      - name: Package release archive
        env:
          ASSET_SLUG: ${{ matrix.asset_slug }}
          TARGET: ${{ matrix.target }}
          TARGET_ARG: ${{ matrix.target_arg }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_dir="prawjector-${VERSION}-${ASSET_SLUG}"
          case "${package_dir}" in
            *unknown*) echo "release package names must not contain unknown"; exit 1 ;;
          esac
          dist_dir="dist/${package_dir}"
          binary="target/${TARGET}/release/prawjector"
          if [ ! -f "${binary}" ]; then
            binary="target/${TARGET_ARG}/release/prawjector"
          fi
          if [ ! -f "${binary}" ]; then
            echo "missing release binary for ${TARGET_ARG}"
            exit 1
          fi
          mkdir -p "${dist_dir}"
          cp "${binary}" "${dist_dir}/prawjector"
          cp README.md "${dist_dir}/README.md"
          chmod 755 "${dist_dir}/prawjector"
          file "${dist_dir}/prawjector"
          case "${ASSET_SLUG}" in
            *musl)
              case "$(file "${dist_dir}/prawjector")" in
                *static*) ;;
                *) echo "expected a static musl binary"; exit 1 ;;
              esac
              ;;
          esac
          tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.asset_slug }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          mv artifacts/*.tar.gz dist/
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          ls -la
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          title="Prawjector ${tag}"
          release_id="$(
            gh api "repos/${repo}/releases" \
              --jq "map(select(.tag_name == \"${tag}\")) | first | .id // empty"
          )"

          if [ -n "${release_id}" ]; then
            gh release upload "${tag}" dist/* --repo "${repo}" --clobber
            gh release edit "${tag}" --repo "${repo}" --verify-tag --draft=false --title "${title}"
          else
            gh release create "${tag}" dist/* --repo "${repo}" --verify-tag --generate-notes --title "${title}"
          fi
